<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Brief Generator — Calibre Co.</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #5b69b1;
    --purple-hover: #7b7fbd;
    --purple-pressed: #3c416f;
    --purple-light: rgba(91,105,177,0.08);
    --dark: #0b0b14;
    --surface: #ffffff;
    --surface-raised: #f7f7fb;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #0b0b14;
    --text-secondary: #58596d;
    --text-muted: #9d9da9;
    --success: #6dc2b0;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, 'Forma DJR Deck', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f8;
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    background: var(--dark);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .nav-logo-mark {
    width: 28px;
    height: 28px;
  }
  .nav-logo-text {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .nav-badge {
    font-size: 11px;
    background: var(--purple-light);
    color: var(--purple-hover);
    border: 1px solid rgba(91,105,177,0.25);
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: 500;
  }

  /* LAYOUT */
  .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 6px; }
  .page-header p { font-size: 15px; color: var(--text-secondary); }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1.25rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-bottom: 1.1rem;
  }

  /* FORM */
  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }
  .optional { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
  input[type="text"], input[type="url"], textarea, select {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-primary);
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
    appearance: none;
  }
  input[type="text"]:focus, input[type="url"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(91,105,177,0.12);
  }
  textarea { resize: vertical; min-height: 150px; line-height: 1.55; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* BUTTONS */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .btn-primary:hover { background: var(--purple-hover); }
  .btn-primary:active { transform: scale(0.98); background: var(--purple-pressed); }
  .btn-primary:disabled { background: var(--text-muted); cursor: not-allowed; }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-ghost:hover { background: var(--surface-raised); }

  .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 1.5rem; }

  /* SPINNER */
  #loading {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: var(--text-secondary); }

  /* RESULT */
  #result { display: none; }
  .result-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .result-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .result-header .company { font-size: 13px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
  .result-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .brief-section { margin-bottom: 1.5rem; }
  .brief-section:last-child { margin-bottom: 0; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--purple);
    margin-bottom: 8px;
  }
  .brief-section p, .brief-section li { font-size: 14px; color: var(--text-primary); line-height: 1.65; }
  .brief-section ul { padding-left: 1.2rem; }
  .brief-section li { margin-bottom: 5px; }

  .tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    background: var(--purple-light);
    color: var(--purple-pressed);
    border-radius: 20px;
    padding: 3px 10px;
    margin: 2px 4px 2px 0;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .meta-cell {
    background: var(--surface-raised);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .meta-cell .meta-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
  .meta-cell .meta-value { font-size: 14px; color: var(--text-primary); font-weight: 500; }

  .about-box {
    background: var(--dark);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 1.5rem;
  }
  .about-box .section-label { color: var(--purple-hover); }
  .about-box p { color: rgba(255,255,255,0.75); font-size: 13px; }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  /* ERROR */
  .error-box {
    background: #fff0f0;
    border: 1px solid #fca5a5;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #b91c1c;
    margin-top: 1rem;
    display: none;
  }

  /* PDF PRINT STYLES */
  @media print {
    body { background: #fff; }
    nav, .form-section, .form-actions, .result-actions, #loading { display: none !important; }
    #result { display: block !important; }
    .card { border: none; padding: 0; }
    .page { padding: 0; max-width: 100%; }
  }

  @media (max-width: 600px) {
    .two-col, .meta-grid { grid-template-columns: 1fr; }
    .result-header { flex-direction: column; }
    nav { padding: 0 1rem; }
    .page { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">
    <svg class="nav-logo-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="14" fill="#5b69b1"/>
      <path d="M19.5 10.5C18.2 8.9 16.2 8 14 8C9.6 8 6 11.6 6 16s3.6 8 8 8c2.2 0 4.2-.9 5.5-2.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="16" r="3" fill="#fff"/>
    </svg>
    <span class="nav-logo-text">Calibre Co.</span>
  </a>
  <span class="nav-badge">Internal Tool</span>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Job Brief Generator</h1>
    <p>Paste meeting notes and let AI build the full brief. Takes about 15 seconds.</p>
  </div>

  <!-- FORM -->
  <div id="form-section">
    <div class="card">
      <div class="card-title">Client details</div>
      <div class="two-col">
        <div class="field">
          <label for="client-name">Company name</label>
          <input type="text" id="client-name" placeholder="e.g. Lunera Health" />
        </div>
        <div class="field">
          <label for="role-title">Role title</label>
          <input type="text" id="role-title" placeholder="e.g. Video Editor (E-commerce)" />
        </div>
      </div>
      <div class="field">
        <label for="airtable-link">Airtable link <span class="optional">optional</span></label>
        <input type="url" id="airtable-link" placeholder="https://airtable.com/..." />
      </div>
    </div>

    <div class="card">
      <div class="card-title">Meeting notes</div>
      <div class="field">
        <label for="meeting-notes">Paste meeting notes from Gemini or any source</label>
        <textarea id="meeting-notes" style="min-height:200px" placeholder="Paste the full meeting notes here — summary, decisions, transcript, whatever you have..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Additional instructions <span class="optional" style="font-size:12px;font-weight:400">optional</span></div>
      <div class="field" style="margin-bottom:0">
        <label for="extra-notes">Any extra context for this brief</label>
        <input type="text" id="extra-notes" placeholder="e.g. Emphasise AI tools, Filipino talent preferred, keep concise..." />
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" id="generate-btn" onclick="generateBrief()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Generate brief
      </button>
      <button class="btn-ghost" onclick="clearForm()">Clear</button>
    </div>

    <div class="error-box" id="error-box"></div>
  </div>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Analysing meeting notes…</p>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="card" id="brief-card">
      <!-- injected by JS -->
    </div>
    <div class="form-actions" style="margin-top:0">
      <button class="btn-primary" onclick="downloadPDF()" id="pdf-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="pdf-label">Download PDF</span>
      </button>
      <button class="btn-ghost" onclick="copyBrief()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span id="copy-label">Copy text</span>
      </button>
      <button class="btn-ghost" onclick="startOver()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        New brief
      </button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';

let briefText = '';
let briefData = null;
let loadingInterval;

const msgs = [
  'Analysing meeting notes…',
  'Extracting role requirements…',
  'Structuring the brief…',
  'Applying Calibre Co. voice…',
  'Polishing the copy…',
  'Almost there…'
];

function showLoading() {
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  let i = 0;
  const el = document.getElementById('loading-msg');
  el.textContent = msgs[0];
  loadingInterval = setInterval(() => {
    i = (i + 1) % msgs.length;
    el.textContent = msgs[i];
  }, 2000);
}

function showResult() {
  clearInterval(loadingInterval);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

function showError(msg) {
  clearInterval(loadingInterval);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

function clearForm() {
  ['client-name','role-title','airtable-link','meeting-notes','extra-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('error-box').style.display = 'none';
}

function startOver() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';
}

async function generateBrief() {
  const client = document.getElementById('client-name').value.trim();
  const role = document.getElementById('role-title').value.trim();
  const airtable = document.getElementById('airtable-link').value.trim();
  const notes = document.getElementById('meeting-notes').value.trim();
  const extra = document.getElementById('extra-notes').value.trim();

  document.getElementById('error-box').style.display = 'none';
  if (!client) { showError('Please enter the company name.'); return; }
  if (!notes) { showError('Please paste the meeting notes.'); return; }

  showLoading();

  const system = `You are a recruitment copywriter for Calibre Co., a creative talent placement agency. Write polished, direct, compelling job briefs. Tone: confident, warm, no corporate fluff. Speak to smart creative professionals.

Always follow this reference brief structure and tone when writing:

---
REFERENCE BRIEF STRUCTURE:

# Video Editor (E-commerce)

## Overview
We're looking for a skilled Video Editor & AI Creative who can create emotionally compelling, high-converting video ads for e-commerce brands. You must understand storytelling, consumer psychology, direct-response marketing, and how to use AI tools to create engaging visual narratives that drive sales.

## Responsibilities

### Storytelling & Creative Execution
- Turn scripts into visually compelling stories.
- Match visuals precisely to the message being communicated.
- Create emotional moments through pacing, visuals, music, sound design, and editing.
- Understand how to build curiosity, tension, empathy, desire, and belief throughout a video.
- Ensure every visual supports the narrative rather than simply filling screen space.
- Bring creative ideas and visual concepts to the table rather than only executing instructions.

### Editing Excellence
- Produce polished, professional videos with strong attention to detail.
- Ensure captions are accurate, properly timed, and free from spelling or grammar mistakes.
- Maintain consistency in voice, character appearance, style, pacing, and branding throughout the video.
- Avoid beginner-level editing mistakes.

### Direct Response & E-commerce
- Understand what makes an ad convert.
- Understand hooks, pattern interrupts, retention mechanics, objections, proof, and offers.
- Edit with performance in mind rather than purely aesthetics.
- Analyze winning ads and apply learnings to future creatives.

## What Great Looks Like
A great candidate:
- Notices mistakes before anyone else does.
- Thinks like a marketer, not just an editor.
- Understands why an ad works, not just how to edit it.
- Is obsessed with improving their craft.
- Constantly studies winning creatives.
- Learns new AI tools before they're mainstream.
- Brings solutions, not problems.

## Key Traits
Creative · Curious · Detail-oriented · Proactive · Resourceful · Growth-minded · Reliable · Organized · Fast learner · Open to feedback · High standards · Strong problem solver

We care far more about curiosity and ownership than years of experience.
---

Use the same section structure, writing style, and level of specificity as the reference above. Adapt the content fully to the new role — do not copy phrases from the reference.

Return ONLY a valid JSON object — no markdown fences, no preamble:
{
  "role_title": "string",
  "company_name": "string",
  "company_description": "2 sentences about the company and what they do",
  "role_summary": "2-3 sentences: what the role is and why it exists",
  "responsibilities": ["6-8 specific responsibility strings"],
  "what_great_looks_like": ["4-6 strings describing a great candidate"],
  "key_traits": ["6-10 short trait labels"],
  "compensation": "string e.g. $1,000 – $2,000/month",
  "workload": "string describing weekly expectations",
  "work_setup": "string e.g. Remote, full-time",
  "tools_preferred": ["array of tool names, can be empty array if none mentioned"]
}`;

  const user = `Client: ${client}
Role: ${role || '(extract from notes)'}
${airtable ? 'Airtable: ' + airtable : ''}

Meeting notes:
${notes}
${extra ? '\nExtra instructions: ' + extra : ''}

Write a complete job brief as JSON.`;

  try {
    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 1200,
        system,
        messages: [{ role: 'user', content: user }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    renderBrief(d);
    showResult();
  } catch (e) {
    console.error(e);
    showError('Something went wrong: ' + e.message + '. Check your API key or try again.');
  }
}

function renderBrief(d) {
  briefData = d;
  const tools = (d.tools_preferred || []).map(t => `<span class="tag">${t}</span>`).join('');
  const traits = (d.key_traits || []).map(t => `<span class="tag">${t}</span>`).join('');
  const resps = (d.responsibilities || []).map(r => `<li>${r}</li>`).join('');
  const wgl = (d.what_great_looks_like || []).map(r => `<li>${r}</li>`).join('');

  briefText = [
    d.role_title,
    d.company_name,
    '',
    d.role_summary,
    '',
    'Responsibilities',
    ...(d.responsibilities || []).map(r => '• ' + r),
    '',
    'What great looks like',
    ...(d.what_great_looks_like || []).map(r => '• ' + r),
    '',
    'Key traits: ' + (d.key_traits || []).join(', '),
    '',
    'Compensation: ' + d.compensation,
    'Workload: ' + d.workload,
    'Setup: ' + d.work_setup,
  ].join('\n');

  document.getElementById('brief-card').innerHTML = `
    <div class="result-header">
      <div>
        <h2>${d.role_title}</h2>
        <div class="company">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          ${d.company_name}
        </div>
      </div>
    </div>

    <div class="brief-section">
      <div class="section-label">About the company</div>
      <p>${d.company_description}</p>
    </div>

    <hr class="divider">

    <div class="brief-section">
      <div class="section-label">Role overview</div>
      <p>${d.role_summary}</p>
    </div>

    <hr class="divider">

    <div class="meta-grid">
      <div class="meta-cell">
        <div class="meta-label">Compensation</div>
        <div class="meta-value">${d.compensation}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-label">Workload</div>
        <div class="meta-value">${d.workload}</div>
      </div>
      <div class="meta-cell" style="grid-column: 1 / -1">
        <div class="meta-label">Work setup</div>
        <div class="meta-value">${d.work_setup}</div>
      </div>
    </div>

    <hr class="divider">

    <div class="brief-section">
      <div class="section-label">Responsibilities</div>
      <ul>${resps}</ul>
    </div>

    <hr class="divider">

    <div class="brief-section">
      <div class="section-label">What great looks like</div>
      <ul>${wgl}</ul>
    </div>

    <hr class="divider">

    <div class="brief-section">
      <div class="section-label">Key traits</div>
      <div>${traits}</div>
    </div>

    ${tools ? `<hr class="divider"><div class="brief-section"><div class="section-label">Preferred tools</div><div>${tools}</div></div>` : ''}
  `;
}

function downloadPDF() {
  if (!briefData) return;
  const btn = document.getElementById('pdf-btn');
  const label = document.getElementById('pdf-label');
  label.textContent = 'Generating…';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const d = briefData;
    const pageW = 210;
    const margin = 18;
    const contentW = pageW - margin * 2;
    let y = 20;

    const purple = [91, 105, 177];
    const dark = [11, 11, 20];
    const muted = [88, 89, 109];
    const light = [247, 247, 251];

    function checkPage(needed) {
      if (y + needed > 272) { doc.addPage(); y = 20; }
    }

    function sectionLabel(text) {
      checkPage(10);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...purple);
      doc.text(text.toUpperCase(), margin, y);
      y += 6;
    }

    function bodyText(text, indent) {
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...dark);
      const lines = doc.splitTextToSize(text, contentW - (indent || 0));
      lines.forEach(line => {
        checkPage(5.5);
        doc.text(line, margin + (indent || 0), y);
        y += 5.2;
      });
    }

    function bulletItem(text) {
      checkPage(6);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...muted);
      doc.text('•', margin + 2, y);
      doc.setTextColor(...dark);
      const lines = doc.splitTextToSize(text, contentW - 8);
      lines.forEach((line, i) => {
        checkPage(5.2);
        doc.text(line, margin + 7, y);
        y += 5;
      });
      y += 0.5;
    }

    function divider() {
      checkPage(6);
      y += 2;
      doc.setDrawColor(220, 220, 228);
      doc.setLineWidth(0.3);
      doc.line(margin, y, pageW - margin, y);
      y += 5;
    }

    function metaRow(label, value) {
      checkPage(12);
      doc.setFillColor(...light);
      doc.roundedRect(margin, y, contentW / 2 - 3, 10, 2, 2, 'F');
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...muted);
      doc.text(label.toUpperCase(), margin + 4, y + 4);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...dark);
      doc.text(value, margin + 4, y + 8.5);
      y += 13;
    }

    // Header bar
    doc.setFillColor(...dark);
    doc.rect(0, 0, pageW, 14, 'F');
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(255, 255, 255);
    doc.text('Calibre Co.', margin, 9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(150, 155, 200);
    doc.text('Job Brief', pageW - margin, 9, { align: 'right' });
    y = 26;

    // Role title
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...dark);
    doc.text(d.role_title, margin, y);
    y += 8;

    // Company
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...muted);
    doc.text(d.company_name, margin, y);
    y += 10;

    divider();

    sectionLabel('About the company');
    bodyText(d.company_description);
    y += 3;

    divider();

    sectionLabel('Role overview');
    bodyText(d.role_summary);
    y += 3;

    divider();

    // Meta cells
    metaRow('Compensation', d.compensation);
    metaRow('Workload', d.workload);
    metaRow('Work setup', d.work_setup);
    y += 2;

    divider();

    sectionLabel('Responsibilities');
    (d.responsibilities || []).forEach(r => bulletItem(r));
    y += 2;

    divider();

    sectionLabel('What great looks like');
    (d.what_great_looks_like || []).forEach(r => bulletItem(r));
    y += 2;

    divider();

    sectionLabel('Key traits');
    const traits = (d.key_traits || []).join('  ·  ');
    bodyText(traits);
    y += 2;

    if (d.tools_preferred && d.tools_preferred.length) {
      divider();
      sectionLabel('Preferred tools');
      bodyText(d.tools_preferred.join('  ·  '));
    }

    const filename = `${d.company_name.replace(/\s+/g, '_')}_${d.role_title.replace(/\s+/g, '_')}_Brief.pdf`;
    doc.save(filename);
  } catch(e) {
    console.error(e);
    alert('PDF generation failed: ' + e.message);
  }

  label.textContent = 'Download PDF';
  btn.disabled = false;
}

function copyBrief() {
  navigator.clipboard.writeText(briefText).then(() => {
    document.getElementById('copy-label').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('copy-label').textContent = 'Copy text'; }, 2000);
  });
}
</script>
</body>
</html>
